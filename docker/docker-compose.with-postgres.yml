services:
  postgres:
    image: postgres:16-alpine
    container_name: lyr-authentik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_USER: ${PG_USER:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS:?database password required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${PG_USER}"]
      timeout: 5s
    networks:
      - lyr-auth-net

  server:
    command: server
    image: ghcr.io/goauthentik/server:2026.5.2
    container_name: lyr-authentik-server
    restart: unless-stopped
    env_file: .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    ports:
      - "${AUTHENTIK_PORT_HTTP:-9000}:9000"
      - "${AUTHENTIK_PORT_HTTPS:-9443}:9443"
    volumes:
      - ./authentik/media:/media
      - ./authentik/custom-templates:/templates:ro
      - ./authentik/blueprints:/blueprints:ro
    shm_size: 512mb
    networks:
      - lyr-auth-net
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    command: worker
    image: ghcr.io/goauthentik/server:2026.5.2
    container_name: lyr-authentik-worker
    restart: unless-stopped
    env_file: .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    user: root
    volumes:
      - ./authentik/media:/media
      - ./authentik/custom-templates:/templates:ro
      - ./authentik/blueprints:/blueprints:ro
      - ./authentik/certs:/certs
    shm_size: 512mb
    networks:
      - lyr-auth-net
    depends_on:
      postgres:
        condition: service_healthy

networks:
  lyr-auth-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
